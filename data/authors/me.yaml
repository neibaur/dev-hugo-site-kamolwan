bio: |
  I am an accounting and finance professional with hands-on experience in full-cycle
  bookkeeping, tax preparation, financial reporting, reconciliation, inventory accounting,
  payroll support, and small business financial operations.

  My background combines a Master's degree in Business Administration with an International
  Business focus, more than five years of practical bookkeeping and tax preparation work,
  and current B.A. in Accounting coursework expected to be completed in September 2026.
  I bring careful recordkeeping, client service, and operational discipline to accounting,
  bookkeeping, tax preparation, accounting internship, and junior accountant opportunities.

